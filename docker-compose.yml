# =============================================================
# Math Copilot - Docker Compose
# =============================================================
# 完整环境：后端 + 前端（生产构建）
# 启动: docker compose up -d
# 停止: docker compose down
# =============================================================

services:
  # ── 后端 API ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: math-copilot-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=false
    volumes:
      # 开发时热加载（取消注释可启用）
      # - ./backend:/app/backend
      - ./backend/skills:/app/backend/skills
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端（生产模式） ───────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: math-copilot-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: >
      sh -c "npm install && npm run build && npm run start"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

